name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo_name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.IMAGE_NAME }}:latest
            ghcr.io/${{ steps.repo_name.outputs.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_REPO: ghcr.io/${{ steps.repo_name.outputs.IMAGE_NAME }}
          DEPLOY_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          timeout: 60s
          envs: GITHUB_TOKEN,GITHUB_ACTOR,IMAGE_REPO,DEPLOY_TAG
          script: |
            cd ~/chatplatform

            # Pull latest changes (for config/compose files)
            git fetch origin main
            git reset --hard origin/main

            # 1. Login to GHCR on EC2 and Pull pre-built image
            echo "$GITHUB_TOKEN" | sudo docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            echo "Pulling image tag: $DEPLOY_TAG..."
            sudo docker pull "$IMAGE_REPO:$DEPLOY_TAG"

            # 2. Tag for docker-compose to use
            sudo docker tag "$IMAGE_REPO:$DEPLOY_TAG" chatwoot/chatwoot:latest
            sudo docker tag "$IMAGE_REPO:$DEPLOY_TAG" chatwoot/chatwoot:"$DEPLOY_TAG"

            # 3. Start containers
            echo "Starting containers..."
            sudo docker-compose -f docker-compose.production.yaml up -d

            # 4. Cleanup old images
            echo "Cleaning up..."
            IMAGES_TO_DELETE=$(sudo docker images chatwoot/chatwoot --format "{{.Tag}} {{.CreatedAt}}" | \
              grep -v "latest" | \
              sort -k2 -r | \
              awk 'NR > 2 {print $1}')

            if [ -n "$IMAGES_TO_DELETE" ]; then
              for tag in $IMAGES_TO_DELETE; do
                sudo docker rmi chatwoot/chatwoot:$tag || true
              done
            fi

            sudo docker image prune -f
