name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m # Increase timeout for long Docker builds
          timeout: 60s # Increase SSH connection timeout
          script: |
            cd ~/chatplatform

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Define TAG based on commit SHA
            DEPLOY_TAG=${{ github.sha }}

            # 1. Build image manually with SHA tag (to keep history)
            echo "Building image for tag: $DEPLOY_TAG... (This may take up to 20-30 minutes)"
            sudo docker build -t chatwoot/chatwoot:$DEPLOY_TAG -f docker/Dockerfile .

            # 2. Tag as latest for docker-compose to use
            sudo docker tag chatwoot/chatwoot:$DEPLOY_TAG chatwoot/chatwoot:latest

            # 3. Start containers using the newly built 'latest' image
            echo "Starting containers..."
            sudo docker-compose -f docker-compose.production.yaml up -d

            # 4. Cleanup: Keep 2 most recent SHA builds and the latest image
            echo "Cleaning up old images..."
            IMAGES_TO_DELETE=$(sudo docker images chatwoot/chatwoot --format "{{.Tag}} {{.CreatedAt}}" | \
              grep -v "latest" | \
              sort -k2 -r | \
              awk 'NR > 2 {print $1}')

            if [ -n "$IMAGES_TO_DELETE" ]; then
              for tag in $IMAGES_TO_DELETE; do
                echo "Deleting old image tag: $tag"
                sudo docker rmi chatwoot/chatwoot:$tag || true
              done
            fi

            # Prune dangling layers
            sudo docker image prune -f
