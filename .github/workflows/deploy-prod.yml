name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/chatplatform

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main

            # Define TAG based on commit SHA
            DEPLOY_TAG=${{ github.sha }}

            # Restart containers with build and specific TAG
            TAG=$DEPLOY_TAG sudo docker-compose -f docker-compose.production.yaml up -d --build

            # Also tag this build as latest
            sudo docker tag chatwoot/chatwoot:$DEPLOY_TAG chatwoot/chatwoot:latest

            # Cleanup: Keep 2 most recent builds (excluding latest) and latest itself
            echo "Cleaning up old images..."
            IMAGES_TO_DELETE=$(sudo docker images chatwoot/chatwoot --format "{{.Tag}} {{.CreatedAt}}" | \
              grep -v "latest" | \
              sort -k2 -r | \
              awk 'NR > 2 {print $1}')

            if [ -n "$IMAGES_TO_DELETE" ]; then
              for tag in $IMAGES_TO_DELETE; do
                echo "Deleting old image tag: $tag"
                sudo docker rmi chatwoot/chatwoot:$tag || true
              done
            fi

            # Prune dangling images
            sudo docker image prune -f
